---
extends: default

rules:
  line-length:
    max: 120
    level: warning

  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: true

  comments:
    min-spaces-from-content: 1

  document-start:
    present: false

  braces:
    max-spaces-inside: 1

  brackets:
    max-spaces-inside: 1

  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

ignore: |
  cdk/node_modules/
  .terraform/
  cdk/cdk.out/

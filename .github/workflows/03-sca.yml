name: "03 - SCA & SBOM"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write

jobs:
  trivy-filesystem:
    name: "Trivy Filesystem Scan"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  grype:
    name: "Grype Vulnerability Scan"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Scan with Grype
        uses: anchore/scan-action@v4
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: grype

  sbom:
    name: "SBOM Generation"
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM for CDK node modules
        run: |
          cd cdk && npm ci --ignore-scripts
          syft dir:. \
            --output spdx-json=../sbom-cdk.spdx.json \
            --output cyclonedx-json=../sbom-cdk-cyclonedx.json

      - name: Generate SBOM for Python Lambdas
        run: |
          syft dir:security/remediation-lambdas \
            --output spdx-json=sbom-lambdas.spdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-*.json
          retention-days: 90

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-*.json
